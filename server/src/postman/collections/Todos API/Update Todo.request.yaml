$kind: http-request
name: Update Todo
method: PATCH
url: '{{base_url}}/todos/{{todo_id}}'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated Todo",
      "completed": true
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("title equals 'Updated Todo'", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.title).to.eql("Updated Todo");
      });

      pm.test("completed equals true", function () {
          var jsonData = pm.response.json();
          pm.expect(jsonData.completed).to.eql(true);
      });
