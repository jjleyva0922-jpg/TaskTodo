$kind: http-request
name: Health Check
method: GET
url: '{{base_url}}/'
order: 1000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response body contains 'Hello World'", function () {
          pm.expect(pm.response.text()).to.include("Hello World");
      });
